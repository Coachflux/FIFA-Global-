<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMI Airdrop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div id="walletDisplay" class="text-xl font-mono">Waiting for wallet...</div>

    <script>
        let userAddress = "0x1234567890abcdef1234567890abcdef12345678";

        function shortenAddress(address) {
            if (!address) return "No address";
            return address.slice(0, 6) + "..." + address.slice(-4);
        }

        document.getElementById("walletDisplay").textContent = "Connected: " + shortenAddress(userAddress);
    </script>
</body>
</html>
